# Online research notes:
# - https://raw.githubusercontent.com/LemonSorcerer/TI4_faction_reference/master/factions/argent.tex
name: Argent flagship detailed reference (Prophecy of Kings)
description: >-
  YAML-sourced Prophecy of Kings testcase for Argent Flight. Verifies the
  flagship statline plus the space-cannon prevention clause.
question: >-
  In Twilight Imperium 4 Prophecy of Kings, what is the flagship of the Argent Flight?
  Return the faction, expansion source, flagship name, cost, combat, move, capacity,
  sustain damage status, and the flagship ability.
assertions:
  - key: faction
    type: equals
    value: The Argent Flight
  - key: expansion
    type: equals
    value: Prophecy of Kings
  - key: name
    type: equals
    value: Quetzecoatl
  - key: cost
    type: equals
    value: '8'
  - key: combat
    type: regex
    value: ^7(\(x2\)|x2)$
  - key: move
    type: equals
    value: '1'
  - key: capacity
    type: equals
    value: '3'
  - key: sustain_damage
    type: equals
    value: 'yes'
  - key: ability
    type: icontains
    value: cannot use space cannon
  - key: ability
    type: icontains
    value: your ships in this system
