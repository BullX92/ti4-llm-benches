    Answer the question with JSON only.
    Return a single valid JSON object.
    Do not include markdown or any extra text.

    {{question}}

tests:
  - vars:
      question: |-
        What is the name of the Federation of Sol flagship in Twilight Imperium 4, and what are its stats and ability?
    metadata:
      name: Sol flagship reference
      description: >-
        Baseline flagship testcase for a classic base-game faction. The model should
        return the Sol flagship identity, core stats, and the infantry-placement
        ability as JSON.
    assert:
      - type: javascript
        value: >-
          (() => { try { const data = typeof output === 'string' ? JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()) : output;
          return data && typeof data === 'object' && !Array.isArray(data); } catch { return false; } })()
      - type: javascript
        value: >-
          (() => { const data = JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()); return data.faction === 'The Federation of Sol'; })()
      - type: javascript
        value: >-
          (() => { const data = JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()); return data.expansion === 'Base Game'; })()
      - type: javascript
        value: >-
          (() => { const data = JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()); return data.name === 'Genesis'; })()
      - type: javascript
        value: >-
          (() => { const data = JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()); return data.cost === '8'; })()
      - type: javascript
        value: >-
          (() => { const data = JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()); return /^5\s*\(x2\)$|^5x2$/i.test(data.combat); })()
      - type: javascript
        value: >-
          (() => { const data = JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()); return data.move === '1'; })()
      - type: javascript
        value: >-
          (() => { const data = JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()); return data.capacity === '12'; })()
      - type: javascript
        value: >-
          (() => { const data = JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()); return typeof data.sustain_damage === 'string' && data.sustain_damage.toLowerCase() === 'yes'; })()
      - type: javascript
        value: >-
          (() => { const data = JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()); return typeof data.ability === 'string' && data.ability.toLowerCase().includes('place 1 infantry'); })()
      - type: javascript
        value: >-
          (() => { const data = JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()); return typeof data.ability === 'string' && data.ability.toLowerCase().includes('status phase'); })()
      - type: javascript
        value: >-
          (() => { const data = JSON.parse(output.replace(/^```json\s*|^```\s*|\s*```$/g, '').trim()); return typeof data.ability === 'string' && data.ability.toLowerCase().includes('space area'); })()
